<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>準則快憶通 SRS v2.1 (診斷強化版)</title>
    <style>
        :root {
            --bg-color: #121212; --surface-color: #1e1e1e;
            --primary-color: #4caf50; --secondary-color: #2196f3;
            --danger-color: #e57373; --warning-color: #ffb74d;
            --text-main: #e0e0e0; --text-sub: #aaaaaa;
        }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none;
        }
        /* 介面佈局 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--surface-color); border-bottom: 1px solid #333; height: 50px; z-index: 20; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
        .status-dot.online { background: #4caf50; box-shadow: 0 0 5px #4caf50; }
        .toolbar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #181818; border-bottom: 1px solid #333; }
        .tool-btn { background: #333; color: #ccc; border: 1px solid #444; padding: 5px 12px; border-radius: 15px; font-size: 0.85rem; white-space: nowrap; cursor: pointer; }
        .tool-btn.active-avoid { background: rgba(229, 115, 115, 0.2); color: var(--danger-color); border-color: var(--danger-color); }
        
        .main-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; perspective: 1000px; }
        .card { 
            width: 90%; max-width: 600px; height: 85%; background: var(--surface-color); border-radius: 16px; padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; position: absolute;
            transition: transform 0.3s ease, opacity 0.3s ease; box-sizing: border-box; border: 1px solid #333;
            touch-action: none; 
        }
        
        /* 答案遮罩：背景相容色 */
        .mask-lv1 { display: inline-block; width: 80px; height: 1.2rem; background: #2a2a2a; border-radius: 4px; border: 1px solid #444; vertical-align: bottom; }
        
        /* 側邊欄與彈窗 */
        .sidebar { position: fixed; top: 0; left: 0; width: 85%; max-width: 320px; height: 100%; background: var(--surface-color); z-index: 101; transform: translateX(-100%); transition: transform 0.3s; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .sidebar.active { transform: translateX(0); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; }
        .sidebar-overlay.active { display: block; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; border: 1px solid #444; }
        
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: flex !important; }
        .mode-btn.active { background: var(--primary-color); color: #fff; }
        
        /* 載入畫面 */
        #loader { position:fixed; top:0; left:0; width:100%; height:100%; background:#121212; z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>

    <div id="loader">
        <div style="font-size: 3rem;">⚡</div>
        <p id="loader-msg">系統啟動中...</p>
    </div>

    <div class="sidebar-overlay" onclick="toggleSidebar(false)"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h3>題庫選單</h3>
            <button onclick="toggleSidebar(false)" style="background:none; border:none; color:#fff; font-size:1.2rem;">✕</button>
        </div>
        <div id="bank-list" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div class="admin-only" style="padding:15px; border-top:1px solid #333; flex-direction:column; gap:10px;">
            <button onclick="openModal('modal-import')" style="width:100%; padding:10px; background:var(--primary-color); border:none; border-radius:6px; color:#fff;">＋ 新增題庫</button>
            <div style="display:flex; gap:5px;">
                <button onclick="exportData()" style="flex:1; padding:8px; background:#444; border:none; border-radius:4px; color:#fff; font-size:0.8rem;">📤 匯出</button>
                <button onclick="document.getElementById('file-input').click()" style="flex:1; padding:8px; background:#444; border:none; border-radius:4px; color:#fff; font-size:0.8rem;">📥 匯入</button>
                <input type="file" id="file-input" style="display:none" onchange="importData(event)">
            </div>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <button onclick="toggleSidebar(true)" style="background:none; border:none; color:#fff; font-size:1.5rem;">☰</button>
            <div id="status-dot" class="status-dot"></div>
        </div>
        <div style="background:#333; border-radius:20px; padding:2px;">
            <button class="tool-btn mode-btn active" id="mode-smart" onclick="setMode('smart')">智慧</button>
            <button class="tool-btn mode-btn" id="mode-cram" onclick="setMode('cram')">瀏覽</button>
        </div>
        <button onclick="toggleAdmin()" id="lock-btn" style="background:none; border:none; font-size:1.2rem;">🔒</button>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="openSettings()">⚙️ 測驗設定</button>
        <button class="tool-btn" onclick="openStatusList()">📋 熟悉度列表</button>
        <button class="tool-btn" id="btn-avoid" onclick="toggleAvoidCurrent()">🚫 避開此題</button>
    </div>

    <div class="main-container">
        <div id="empty-state" style="display:none; text-align:center;">
            <div style="font-size:4rem;">🎉</div><h2>任務完成</h2>
            <button onclick="openSettings('reset')" style="padding:10px 20px; border-radius:20px; background:var(--primary-color); border:none; color:#fff;">重設範圍</button>
        </div>

        <div class="card" id="active-card">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#666; margin-bottom:5px;">
                <span id="q-index">#0</span><span>剩餘: <span id="queue-count">0</span></span>
            </div>
            <div style="font-size: 1.3rem; font-weight: bold; color: #81c784; margin-bottom: 20px;" id="q-text">請先選擇題庫</div>
            <div class="answer-box" id="a-text"></div>
            
            <div id="control-bar-main" style="display:flex; justify-content:space-between; margin-top:auto; padding-top:10px; border-top:1px solid #333;">
                <button class="tool-btn" onclick="undoAction()">↩ 復原</button>
                <button class="tool-btn" onclick="cycleMask()" id="mask-btn">遮罩: Lv1</button>
                <button class="tool-btn" onclick="skipAction()">➡ 跳過</button>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal"><div class="modal-content">
        <h3>📖 抽題範圍設定</h3>
        <input type="number" id="set-start" placeholder="起始題號" value="1" style="width:100%; padding:8px; background:#2a2a2a; border:1px solid #444; color:#fff;">
        <input type="number" id="set-end" placeholder="結束題號" style="width:100%; padding:8px; background:#2a2a2a; border:1px solid #444; color:#fff;">
        <button onclick="applySettings()" style="width:100%; padding:12px; background:var(--primary-color); color:#fff; border:none; margin-top:15px; border-radius:6px;">確認</button>
    </div></div>

    <div id="modal-status" class="modal"><div class="modal-content">
        <h3>📊 熟悉度 (點擊可跳題)</h3>
        <div id="status-list-body" style="display:flex; flex-direction:column; gap:8px;"></div>
        <button onclick="closeModal('modal-status')" style="width:100%; padding:10px; margin-top:15px;">關閉</button>
    </div></div>

    <div id="modal-import" class="modal"><div class="modal-content">
        <h3>匯入新題庫</h3>
        <input id="imp-title" placeholder="名稱" style="width:100%; padding:8px; background:#2a2a2a; color:#fff;">
        <textarea id="imp-content" style="height:150px; margin-top:10px; width:100%; background:#2a2a2a; color:#fff;" placeholder="Q:題目&#10;A:答案"></textarea>
        <button onclick="submitImport()" style="width:100%; padding:12px; background:var(--primary-color); border:none; color:#fff; margin-top:10px;">儲存</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, query, onSnapshot, getDoc, setDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7MgXLY7SwH-gJW71d1jgpPmJwr--I6Mg",
            authDomain: "doctrine-flash.firebaseapp.com",
            projectId: "doctrine-flash",
            storageBucket: "doctrine-flash.firebasestorage.app",
            messagingSenderId: "433425348870",
            appId: "1:433425348870:web:3fd60e44e18d27e1ab8687"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser, banks = [], allCards = [], studyQueue = [], historyStack = [], progressMap = {};
        let currentBankId = null, studyMode = 'smart', maskLevel = 1, isAdmin = false;
        let touchStartX = 0, touchStartY = 0;

        // --- 診斷與啟動邏輯 ---
        const safetyTimer = setTimeout(() => {
            if (document.getElementById('loader').style.display !== 'none') {
                document.getElementById('loader').style.display = 'none';
                alert("診斷提示：連線逾時。請檢查 Firebase Rules 或匿名登入是否啟用。");
            }
        }, 8000);

        onAuthStateChanged(auth, async (user) => {
            try {
                if(user) {
                    clearTimeout(safetyTimer);
                    currentUser = user;
                    document.getElementById('status-dot').classList.add('online');
                    await loadBanks();
                    document.getElementById('loader').style.display = 'none';
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                alert("驗證失敗: " + e.message);
            }
        });

        async function loadBanks() {
            try {
                const q = query(collection(db, 'public_question_banks'));
                const snap = await getDocs(q);
                banks = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderSidebar();
                const saved = JSON.parse(localStorage.getItem('df_progress') || '{}');
                if(saved.bankId) selectBank(saved.bankId);
            } catch (e) {
                alert("資料庫讀取失敗: " + e.message);
            }
        }

        // --- 核心業務邏輯 ---
        async function selectBank(id) {
            const b = banks.find(x => x.id === id);
            if(!b) return;
            currentBankId = id; 
            allCards = b.questions || [];
            localStorage.setItem('df_progress', JSON.stringify({ bankId: id }));
            const progSnap = await getDoc(doc(db, 'users', currentUser.uid, 'progress', id));
            progressMap = progSnap.exists() ? progSnap.data().reviews || {} : {};
            buildQueue();
            renderSidebar();
        }

        function buildQueue(filter = null) {
            let candidates = allCards.map((_, i) => i).filter(i => !progressMap[i]?.avoid);
            if(filter) candidates = candidates.filter(i => (i+1) >= filter.start && (i+1) <= filter.end);
            studyQueue = (studyMode === 'smart' && !filter) 
                ? candidates.filter(i => (progressMap[i]?.nextReview || 0) <= Date.now()) 
                : candidates;
            renderCard();
        }

        function renderCard() {
            const card = document.getElementById('active-card');
            const empty = document.getElementById('empty-state');
            if(studyQueue.length === 0) { card.style.display = 'none'; empty.style.display = 'block'; return; }
            card.style.display = 'flex'; empty.style.display = 'none';
            card.style.transform = 'translate(0,0)'; card.style.opacity = '1';
            
            const idx = studyQueue[0];
            document.getElementById('q-index').innerText = `#${idx + 1}`;
            document.getElementById('q-text').innerText = allCards[idx].q;
            document.getElementById('queue-count').innerText = studyQueue.length;
            document.getElementById('btn-avoid').classList.toggle('active-avoid', !!progressMap[idx]?.avoid);
            
            const aDiv = document.getElementById('a-text');
            if(maskLevel === 1) aDiv.innerHTML = '<div class="mask-lv1"></div>';
            else if(maskLevel === 2) aDiv.innerText = allCards[idx].a.substring(0, 5) + "...";
            else aDiv.innerText = allCards[idx].a;
        }

        // --- 全域掛載 ---
        window.setMode = (m) => { studyMode = m; buildQueue(); document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id === `mode-${m}`)); };
        window.toggleSidebar = (s) => { document.querySelector('.sidebar').classList.toggle('active', s); document.querySelector('.sidebar-overlay').classList.toggle('active', s); };
        window.openModal = (id) => document.getElementById(id).classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.cycleMask = () => { maskLevel = (maskLevel % 3) + 1; document.getElementById('mask-btn').innerText = `遮罩: Lv${maskLevel}`; renderCard(); };
        window.skipAction = () => { studyQueue.push(studyQueue.shift()); renderCard(); };
        window.undoAction = () => { if(historyStack.length) studyQueue.unshift(historyStack.pop()); renderCard(); };
        window.toggleAdmin = () => { isAdmin = !isAdmin; document.body.classList.toggle('is-admin', isAdmin); document.getElementById('lock-btn').innerText = isAdmin ? "🔓" : "🔒"; };
        window.selectBank = selectBank;
        
        window.toggleAvoidCurrent = async () => {
            if(!currentBankId || studyQueue.length === 0) return;
            const idx = studyQueue[0];
            if(!progressMap[idx]) progressMap[idx] = {};
            progressMap[idx].avoid = !progressMap[idx].avoid;
            await setDoc(doc(db, 'users', currentUser.uid, 'progress', currentBankId), { reviews: progressMap }, { merge: true });
            buildQueue();
        };

        window.jumpToCard = (idx) => { studyQueue = studyQueue.filter(i => i !== idx); studyQueue.unshift(idx); closeModal('modal-status'); renderCard(); };

        window.openStatusList = () => {
            const body = document.getElementById('status-list-body');
            body.innerHTML = allCards.map((c, i) => `
                <div onclick="jumpToCard(${i})" style="padding:10px; background:#2a2a2a; border-radius:6px; cursor:pointer; display:flex; justify-content:space-between; border:1px solid #444;">
                    <span>#${i+1} ${c.q.substring(0, 15)}...</span>
                    <span style="color:${progressMap[i]?.avoid ? '#e57373' : '#888'}">${progressMap[i]?.avoid ? '🚫 避開' : '📋'}</span>
                </div>
            `).join('');
            openModal('modal-status');
        };

        window.exportData = () => { const blob = new Blob([JSON.stringify(banks)], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'backup.json'; a.click(); };
        window.importData = (e) => { const reader = new FileReader(); reader.onload = async (ev) => { const imported = JSON.parse(ev.target.result); const batch = writeBatch(db); imported.forEach(b => { const ref = doc(collection(db, 'public_question_banks')); batch.set(ref, {title:b.title, questions:b.questions, order:Date.now()}); }); await batch.commit(); alert("匯入成功"); }; reader.readAsText(e.target.files[0]); };

        window.applySettings = () => { const s = parseInt(document.getElementById('set-start').value) || 1; const e = parseInt(document.getElementById('set-end').value) || allCards.length; buildQueue({start:s, end:e}); closeModal('modal-settings'); };
        
        async function handleAction(dir) {
            const idx = studyQueue.shift(); historyStack.push(idx);
            if(studyMode === 'smart') {
                let p = progressMap[idx] || { interval: 0 };
                if(dir === 'right') p.interval = p.interval === 0 ? 1 : Math.ceil(p.interval * 2.5);
                else p.interval = 0;
                p.nextReview = Date.now() + (p.interval * 24 * 3600 * 1000);
                progressMap[idx] = p;
                setDoc(doc(db, 'users', currentUser.uid, 'progress', currentBankId), { reviews: progressMap }, { merge: true });
                if(dir !== 'right') studyQueue.push(idx);
            } else { if(dir !== 'right') studyQueue.push(idx); }
            renderCard();
        }

        // 手勢監聽
        cardEl.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; cardEl.style.transition = 'none'; });
        cardEl.addEventListener('touchmove', e => {
            const dx = e.touches[0].clientX - touchStartX; const dy = e.touches[0].clientY - touchStartY;
            cardEl.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx*0.05}deg)`;
            cardEl.classList.toggle('swipe-left', dx < -80); cardEl.classList.toggle('swipe-right', dx > 80); cardEl.classList.toggle('swipe-down', dy > 80);
        });
        cardEl.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX; const dy = e.changedTouches[0].clientY - touchStartY;
            if(dx < -100) handleAction('left'); else if(dx > 100) handleAction('right'); else if(dy > 100) handleAction('down');
            else { cardEl.style.transition = '0.3s'; cardEl.style.transform = 'translate(0,0)'; }
            cardEl.classList.remove('swipe-left', 'swipe-right', 'swipe-down');
        });

        function renderSidebar() {
            const list = document.getElementById('bank-list');
            list.innerHTML = banks.map(b => `<div onclick="window.selectBank('${b.id}'); window.toggleSidebar(false)" style="padding:12px; margin-bottom:5px; background:#2a2a2a; border-radius:8px; cursor:pointer;">${b.title}</div>`).join('');
        }
    </script>
</body>
</html>
