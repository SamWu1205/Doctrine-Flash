<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>準則快憶通 SRS v2.4</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #4caf50; --secondary-color: #2196f3;
            --danger-color: #e57373; --warning-color: #ffb74d;
            --text-main: #e0e0e0; --text-sub: #aaaaaa;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 999; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;
            background: var(--surface-color); border-bottom: 1px solid #333; height: 50px; z-index: 20;
        }
        .toolbar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #181818;
            border-bottom: 1px solid #333; }
        .tool-btn { background: #333; color: #ccc;
            border: 1px solid #444; padding: 5px 12px; border-radius: 15px; font-size: 0.85rem; white-space: nowrap; cursor: pointer;
        }
        .main-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
            overflow: hidden; perspective: 1000px; }
        .card { width: 90%; max-width: 600px; height: 85%;
            background: var(--surface-color); border-radius: 16px; padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; position: absolute;
            transition: transform 0.3s ease, opacity 0.3s ease; border: 1px solid #333; touch-action: none;
            box-sizing: border-box;
        }
        .question-box { font-size: 1.3rem; font-weight: bold; color: #81c784; margin-bottom: 20px; }
        .answer-box { font-size: 1.15rem; line-height: 1.8; flex: 1; overflow-y: auto; white-space: pre-wrap; position: relative; }
        
        /* 批改樣式 */
        .diff-del { color: #ff5252; text-decoration: line-through; font-weight: bold; margin: 0 2px; }
        .diff-ins { color: #4caf50; font-weight: bold; margin: 0 2px; }
        .diff-ins::before { content: '('; }
        .diff-ins::after { content: ')'; }
        .result-title { font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; border: 1px solid #444; }
        
        input[type="number"], textarea { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; margin: 5px 0; box-sizing: border-box; }
        .sidebar { position: fixed; top: 0; left: 0; width: 85%; max-width: 300px; height: 100%; background: #1e1e1e; z-index: 210; transform: translateX(-100%); transition: 0.3s; border-right: 1px solid #333; }
        .sidebar.active { transform: translateX(0); }
        .primary-btn { width: 100%; padding: 12px; background: var(--primary-color); border: none; color: #fff; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loader">
        <div style="font-size: 24px; margin-bottom: 10px;">⚡ 系統啟動中...</div>
        <div id="status-text" style="color: #666; font-size: 14px;">初始化 Firebase...</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h3>題庫清單</h3>
            <button onclick="toggleSidebar(false)" style="background:none; border:none; color:#888;">✕</button>
        </div>
        <div id="bank-list" style="padding:10px;"></div>
    </div>

    <div class="header">
        <button onclick="toggleSidebar(true)" style="background:none; border:none; color:#fff; font-size:1.5rem;">☰</button>
        <div style="background:#333; border-radius:20px; display:flex;">
            <button class="tool-btn" id="m-smart" onclick="setMode('smart')" style="border:none;">智慧</button>
            <button class="tool-btn" id="m-cram" onclick="setMode('cram')" style="border:none;">瀏覽</button>
        </div>
        <button onclick="toggleAdmin()" id="lock-btn" style="background:none; border:none; font-size: 1.2rem;">🔒</button>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="openSettings()">⚙️ 測驗設定</button>
        <button class="tool-btn" id="typing-btn" onclick="toggleTypingMode()">⌨️ 練打: 關</button>
        <button class="tool-btn" onclick="openStatusList()">📋 熟悉度列表</button>
        <button class="tool-btn" onclick="toggleAvoidCurrent()">🚫 避開此題</button>
    </div>

    <div class="main-container">
        <div id="empty-state" style="display:none; text-align:center; padding:20px; width:100%;">🎉 任務完成</div>
        <div class="card" id="active-card" onclick="handleFlip()">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#666;">
                <span id="q-index">#0</span><span>剩餘: <span id="queue-count">0</span></span>
            </div>
            <div class="question-box" id="q-text"></div>
            <div class="answer-box" id="a-text"></div>
            
            <div id="quiz-area" style="display:none; flex-direction:column; gap:10px; margin-top:10px;">
                <textarea id="quiz-input" style="height:120px;" placeholder="在此輸入答案..." onclick="event.stopPropagation()"></textarea>
                <button id="quiz-submit-btn" style="padding:12px; background:var(--secondary-color); border:none; color:#fff; border-radius:8px; font-weight:bold; cursor:pointer;">送出答案</button>
            </div>

            <div id="ctrl-bar" style="display:flex; justify-content:space-between; margin-top:auto; padding-top:10px; border-top:1px solid #333;">
                <button class="tool-btn" onclick="event.stopPropagation(); undoAction()">↩ 復原</button>
                <button class="tool-btn" id="mask-btn" onclick="event.stopPropagation(); toggleMask()">遮罩: Lv1</button>
                <button class="tool-btn" onclick="event.stopPropagation(); handleAction('left')">➡ 跳過</button>
            </div>
        </div>
    </div>

    <div id="modal-result" class="modal">
        <div class="modal-content">
            <div id="result-status" class="result-title"></div>
            <div style="color: #888; font-size: 0.9rem; margin-bottom: 5px;">比對結果（紅色為錯誤/多寫，綠色為應修正內容）：</div>
            <div id="diff-display" style="background:#111; padding:15px; border-radius:8px; line-height:2; margin-bottom:15px; border:1px solid #333;"></div>
            <button class="primary-btn" onclick="closeResultModal()">下第一步</button>
        </div>
    </div>

    <div id="modal-settings" class="modal"><div class="modal-content">
        <h3>📖 測驗範圍與設定</h3>
        <label>範圍: 起始 ~ 結束</label>
        <div style="display:flex; gap:10px;">
            <input type="number" id="set-start" value="1">
            <input type="number" id="set-end">
        </div>
        <label>抽題數量</label>
        <input type="number" id="set-count" value="10">
        <div style="border-top:1px solid #333; margin:10px 0; padding-top:10px;">
            <label>難度佔比 (易 / 中 / 難 %)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="set-easy" value="30">
                <input type="number" id="set-mid" value="40">
                <input type="number" id="set-hard" value="30">
            </div>
        </div>
        <label style="display:flex; align-items:center; gap:10px; margin:10px 0;">
            <input type="checkbox" id="set-quiz" checked> ✍️ 啟用小考評分模式
        </label>
        <button onclick="applySettings()" class="primary-btn">開始測驗</button>
        <button onclick="closeModal('modal-settings')" style="width:100%; background:none; border:none; color:#aaa; margin-top:10px;">取消</button>
    </div></div>

    <div id="modal-status" class="modal"><div class="modal-content">
        <h3>📊 熟悉度列表</h3>
        <div id="status-list-body" style="display:flex; flex-direction:column; gap:8px;"></div>
        <button onclick="closeModal('modal-status')" style="width:100%; padding:10px; margin-top:15px;">關閉</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyC7MgXLY7SwH-gJW71d1jgpPmJwr--I6Mg", 
            authDomain: "doctrine-flash.firebaseapp.com", 
            projectId: "doctrine-flash", 
            storageBucket: "doctrine-flash.firebasestorage.app", 
            messagingSenderId: "433425348870", 
            appId: "1:433425348870:web:3fd60e44e18d27e1ab8687" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser, banks = [], allCards = [], studyQueue = [], historyStack = [], progressMap = {};
        let currentBankId = null, studyMode = 'smart', isQuizMode = false, isTypingMode = false, isAdmin = false, maskLevel = 1;
        let touchX = 0, lastIsCorrect = false;

        const logStatus = (txt) => document.getElementById('status-text').innerText = txt;
        const hideLoader = () => document.getElementById('loader').style.display = 'none';

        onAuthStateChanged(auth, async user => {
            try {
                if(user) { currentUser = user; await loadBanks(); }
                else { await signInAnonymously(auth); }
            } catch(e) { console.error(e); } finally { hideLoader(); }
        });

        async function loadBanks() {
            try {
                const snap = await getDocs(collection(db, 'public_question_banks'));
                banks = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderSidebar();
                const saved = JSON.parse(localStorage.getItem('df_progress') || '{}');
                if(saved.bankId) selectBank(saved.bankId);
            } catch(e) { console.error(e); }
        }

        window.selectBank = async (id) => {
            const b = banks.find(x => x.id === id);
            if(!b) return;
            currentBankId = id; allCards = b.questions || [];
            localStorage.setItem('df_progress', JSON.stringify({ bankId: id }));
            const pSnap = await getDoc(doc(db, 'users', currentUser.uid, 'progress', id));
            progressMap = pSnap.exists() ? pSnap.data().reviews || {} : {};
            buildQueue();
        };

        function buildQueue() {
            if (!allCards.length) return;
            studyQueue = allCards.map((_, i) => i).filter(i => {
                if (progressMap[i]?.avoid) return false;
                if (studyMode === 'smart') {
                    const p = progressMap[i];
                    return !p?.nextReview || p.nextReview <= Date.now();
                }
                return true;
            });
            renderCard();
        }

        // --- 批改邏輯優化 ---
        // 移除項次(如 1. 2.)、標點符號與空白
        function normalize(t) { 
            if(!t) return "";
            return t.replace(/^[0-9]+[、\.\s]*/gm, '') // 移除每行開頭的 1. 或 1、
                    .replace(/[，。、；：？！\n\s()（）「」『』\. \-]/g, ''); // 移除所有標點與空白
        }

        // 核心差異比對演算法 (簡單字串比對)
        function generateDiff(input, target) {
            const cleanInput = normalize(input);
            const cleanTarget = normalize(target);
            
            let resultHtml = "";
            let i = 0, j = 0;

            while (i < cleanInput.length || j < cleanTarget.length) {
                if (cleanInput[i] === cleanTarget[j]) {
                    resultHtml += cleanTarget[j] || "";
                    i++; j++;
                } else {
                    // 發現不一致，尋找下一個匹配點以決定是「多寫」還是「寫錯」
                    let nextMatchTarget = cleanTarget.indexOf(cleanInput[i], j);
                    
                    if (i < cleanInput.length && (nextMatchTarget === -1 || nextMatchTarget > j + 5)) {
                        // 使用者寫了目標沒有的字 (多寫或寫錯)
                        resultHtml += `<del class="diff-del">${cleanInput[i]}</del>`;
                        i++;
                    } else {
                        // 使用者漏寫了目標的字
                        resultHtml += `<ins class="diff-ins">${cleanTarget[j]}</ins>`;
                        j++;
                    }
                }
            }
            return resultHtml;
        }

        window.handleTypingSubmit = () => {
            const idx = studyQueue[0];
            const userInput = document.getElementById('quiz-input').value;
            const targetAnswer = allCards[idx].a;
            
            const isCorrect = normalize(userInput) === normalize(targetAnswer);
            lastIsCorrect = isCorrect;

            // 顯示視覺化結果 Modal
            const statusEl = document.getElementById('result-status');
            statusEl.innerHTML = isCorrect ? "✅ 完美正確！" : "❌ 內容有誤";
            statusEl.style.color = isCorrect ? "var(--primary-color)" : "var(--danger-color)";
            
            document.getElementById('diff-display').innerHTML = isCorrect ? targetAnswer : generateDiff(userInput, targetAnswer);
            document.getElementById('modal-result').classList.add('active');
        };

        window.closeResultModal = () => {
            document.getElementById('modal-result').classList.remove('active');
            handleAction(lastIsCorrect ? 'right' : 'left');
        };

        window.toggleAdmin = () => {
            if (!isAdmin) {
                const pass = prompt("請輸入管理員密碼:");
                if (pass === "1001") {
                    isAdmin = true;
                    document.getElementById('lock-btn').innerText = '🔓';
                    alert("管理員模式已開啟");
                } else { alert("密碼錯誤"); }
            } else {
                isAdmin = false;
                document.getElementById('lock-btn').innerText = '🔒';
            }
        };

        window.toggleTypingMode = () => { 
            isTypingMode = !isTypingMode;
            document.getElementById('typing-btn').innerText = isTypingMode ? "⌨️ 練打: 開" : "⌨️ 練打: 關"; 
            renderCard(); 
        };

        function renderCard() {
            const card = document.getElementById('active-card');
            const empty = document.getElementById('empty-state');
            if(!studyQueue.length) {
                card.style.display = 'none'; empty.style.display = 'block';
                return;
            }
            card.style.display = 'flex'; empty.style.display = 'none';
            const idx = studyQueue[0];
            document.getElementById('q-index').innerText = `#${idx + 1}`;
            document.getElementById('q-text').innerText = allCards[idx].q;
            document.getElementById('queue-count').innerText = studyQueue.length;
            
            const aDiv = document.getElementById('a-text');
            const quizArea = document.getElementById('quiz-area');
            if(isQuizMode || isTypingMode) {
                aDiv.innerText = "(請輸入答案)";
                quizArea.style.display = 'flex';
                document.getElementById('ctrl-bar').style.display = 'none';
                document.getElementById('quiz-input').value = '';
                document.getElementById('quiz-submit-btn').onclick = (e) => { e.stopPropagation(); handleTypingSubmit(); };
            } else {
                quizArea.style.display = 'none';
                document.getElementById('ctrl-bar').style.display = 'flex';
                aDiv.innerHTML = maskLevel === 3 ? allCards[idx].a : '<div class="mask-lv1"></div>';
            }
        }

        window.handleAction = async (dir) => {
            const idx = studyQueue.shift();
            if(idx === undefined) return;
            historyStack.push(idx);
            if(studyMode === 'smart') {
                let p = progressMap[idx] || { interval: 0 };
                p.interval = (dir === 'right') ? (p.interval === 0 ? 1 : Math.ceil(p.interval * 2.5)) : 0;
                p.nextReview = Date.now() + (p.interval * 86400000);
                progressMap[idx] = p;
                setDoc(doc(db, 'users', currentUser.uid, 'progress', currentBankId), { reviews: progressMap }, { merge: true });
            }
            if(dir !== 'right') studyQueue.push(idx);
            maskLevel = 1; renderCard();
        };

        window.handleFlip = () => { if(!isQuizMode && !isTypingMode) { maskLevel = 3; renderCard(); } };
        window.toggleMask = () => { maskLevel = (maskLevel === 1 ? 3 : 1); document.getElementById('mask-btn').innerText = `遮罩: Lv${maskLevel}`; renderCard(); };
        window.undoAction = () => { if(historyStack.length) { studyQueue.unshift(historyStack.pop()); renderCard(); } };
        window.setMode = (m) => { studyMode = m; buildQueue(); };
        window.toggleSidebar = (s) => document.getElementById('sidebar').classList.toggle('active', s);
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.openSettings = () => {
            if(!currentBankId) return alert("請先選擇題庫");
            document.getElementById('set-end').value = allCards.length;
            document.getElementById('modal-settings').classList.add('active');
        };

        window.applySettings = () => {
            const start = parseInt(document.getElementById('set-start').value) || 1;
            const end = parseInt(document.getElementById('set-end').value) || allCards.length;
            const count = parseInt(document.getElementById('set-count').value) || 10;
            isQuizMode = document.getElementById('set-quiz').checked;
            let pool = allCards.map((_, i) => i).filter(i => (i+1) >= start && (i+1) <= end && !progressMap[i]?.avoid);
            let easy = [], mid = [], hard = [];
            pool.forEach(i => {
                const inv = progressMap[i]?.interval || 0;
                if(inv === 0) hard.push(i); else if(inv <= 5) mid.push(i); else easy.push(i);
            });
            const rE = (parseInt(document.getElementById('set-easy').value) || 0) / 100;
            const rM = (parseInt(document.getElementById('set-mid').value) || 0) / 100;
            const shuffle = (a) => a.sort(() => Math.random() - 0.5);
            studyQueue = [
                ...shuffle(easy).slice(0, Math.floor(count * rE)), 
                ...shuffle(mid).slice(0, Math.floor(count * rM)), 
                ...shuffle(hard).slice(0, Math.max(0, count - Math.floor(count*rE) - Math.floor(count*rM)))
            ];
            closeModal('modal-settings');
            renderCard();
        };

        window.openStatusList = () => { 
            document.getElementById('status-list-body').innerHTML = allCards.map((c, i) => `<div onclick="jumpToCard(${i})" style="padding:10px; background:#252525; border-radius:6px; margin-bottom:5px; cursor:pointer;">#${i+1} ${c.q.substring(0,10)}...</div>`).join('');
            document.getElementById('modal-status').classList.add('active');
        };

        window.jumpToCard = (i) => { studyQueue = studyQueue.filter(x => x !== i); studyQueue.unshift(i); closeModal('modal-status'); renderCard(); };
        window.toggleAvoidCurrent = () => { const i = studyQueue[0]; if(i!==undefined) { progressMap[i] = {...progressMap[i], avoid: !progressMap[i]?.avoid}; buildQueue(); } };
        function renderSidebar() { document.getElementById('bank-list').innerHTML = banks.map(b => `<div onclick="selectBank('${b.id}'); toggleSidebar(false)" style="padding:15px; border-bottom:1px solid #333; cursor:pointer;">${b.title}</div>`).join(''); }

        const cardElement = document.getElementById('active-card');
        cardElement.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; cardElement.style.transition = 'none'; });
        cardElement.addEventListener('touchend', e => {
            if(isQuizMode || isTypingMode) return;
            let dx = e.changedTouches[0].clientX - touchX;
            if(dx > 100) handleAction('right'); else if(dx < -100) handleAction('left');
            else { cardElement.style.transition = '0.3s'; cardElement.style.transform = 'translate(0,0)'; }
        });
    </script>
</body>
</html>
