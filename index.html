<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>準則快憶通 SRS v2</title>
    <style>
        /* --- 核心設定 --- */
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #4caf50;
            --secondary-color: #2196f3;
            --danger-color: #e57373;
            --warning-color: #ffb74d;
            --text-main: #e0e0e0;
            --text-sub: #aaaaaa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* --- 導航列 --- */
        .header {
            display: flex;
            justify-content: space-between; align-items: center;
            padding: 10px 15px; background-color: var(--surface-color);
            border-bottom: 1px solid #333; z-index: 20;
            height: 50px;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; display: inline-block; }
        .status-dot.online { background: #4caf50; box-shadow: 0 0 5px #4caf50; }
        .notification-badge {
            background: var(--danger-color);
            color: white; font-size: 0.7rem;
            padding: 2px 6px; border-radius: 10px; margin-left: 5px; display: none;
        }
        .notification-badge.show { display: inline-block; }

        /* --- 工具列 --- */
        .toolbar {
            display: flex;
            gap: 8px; overflow-x: auto; padding: 10px;
            background: #181818; border-bottom: 1px solid #333;
        }
        .tool-btn {
            background: #333;
            color: #ccc; border: 1px solid #444;
            padding: 5px 12px; border-radius: 15px; font-size: 0.85rem;
            white-space: nowrap; cursor: pointer; display: flex;
            align-items: center; gap: 5px;
        }
        .tool-btn:active { background: #444; }
        
        .tool-btn.active-avoid {
            background: rgba(229, 115, 115, 0.2);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        /* --- 卡片主體 (滑動區) --- */
        .main-container {
            flex: 1;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; perspective: 1000px;
        }

        .card {
            width: 90%;
            max-width: 600px; height: 85%;
            background: var(--surface-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            position: absolute;
            transition: transform 0.3s ease, opacity 0.3s ease;
            box-sizing: border-box;
            border: 1px solid #333;
        }

        .empty-state {
            text-align: center;
            color: #777; display: none;
        }
        .empty-state.show { display: block; }
        .empty-state h2 { color: var(--primary-color); margin-bottom: 10px; }

        .swipe-indicator {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 2rem; font-weight: bold; opacity: 0;
            border: 4px solid; padding: 5px 10px; border-radius: 8px;
            transform: rotate(15deg);
            pointer-events: none;
        }
        .swipe-left .indicator-forget { opacity: 1; color: var(--danger-color); border-color: var(--danger-color); }
        .swipe-right .indicator-easy { opacity: 1; color: var(--primary-color); border-color: var(--primary-color); }
        .swipe-down .indicator-blur { opacity: 1; color: var(--warning-color); border-color: var(--warning-color); top: auto; bottom: 20px; }

        .question-meta {
            font-size: 0.8rem;
            color: #666; margin-bottom: 5px; display: flex; justify-content: space-between;
        }
        .question-box {
            font-size: 1.3rem;
            font-weight: bold; color: #81c784;
            margin-bottom: 20px; flex-shrink: 0;
        }

        .answer-box {
            font-size: 1.15rem;
            line-height: 1.8;
            flex: 1; overflow-y: auto; position: relative;
            white-space: pre-wrap;
        }

        .mask-lv1, .mask-hidden {
            display: inline-block;
            width: 60px; height: 1.2rem;
            background: var(--surface-color);
            color: transparent !important;
            user-select: none;
            vertical-align: bottom;
            border-bottom: 2px solid #555;
            margin: 0 4px;
        }
        .mask-lv2 { color: #aaa; }

        /* --- 小考模式手寫區 --- */
        .quiz-area {
            display: none;
            flex-direction: column;
            gap: 10px; margin-top: 15px; width: 100%; flex: 1;
        }
        .quiz-area.active { display: flex; }
        
        .quiz-input {
            width: 100%;
            flex: 1; min-height: 150px;
            background: #181818; border: 1px solid #444; color: #fff;
            padding: 10px; border-radius: 8px; resize: none; font-size: 1.1rem;
            box-sizing: border-box;
        }
        .quiz-submit-btn {
            padding: 10px;
            background: var(--secondary-color); border: none;
            color: #fff; border-radius: 6px; font-weight: bold; cursor: pointer;
        }
        .quiz-submit-btn:active { background: #1976d2; }
        .quiz-next-btn { background: var(--warning-color); color: #121212; }
        .quiz-next-btn:active { background: #f57c00; }

        .diff-correct { color: #4caf50; }
        .diff-wrong { color: var(--danger-color); text-decoration: line-through; opacity: 0.8; }
        .diff-missing { color: var(--danger-color); font-weight: bold; border-bottom: 1px dashed var(--danger-color); }

        /* --- 底部控制列 --- */
        .control-bar {
            display: flex;
            justify-content: space-between; align-items: center;
            margin-top: auto; padding-top: 15px; border-top: 1px solid #333;
        }
        .nav-btn {
            background: #2a2a2a;
            border: 1px solid #444; color: #fff;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .nav-btn:active { background: #444; }

        /* 側邊欄與 Modal */
        .sidebar-overlay, .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; display: none;
        }
        .sidebar {
            position: fixed;
            top: 0; left: 0; width: 85%; max-width: 320px; height: 100%;
            background: var(--surface-color); z-index: 101;
            transform: translateX(-100%); transition: transform 0.3s;
            display: flex; flex-direction: column; border-right: 1px solid #333;
        }
        .sidebar.active { transform: translateX(0); }
        .modal.active, .sidebar-overlay.active { display: flex; justify-content: center; align-items: center; }
        
        .modal-content {
            background: #1e1e1e;
            padding: 20px; border-radius: 12px; width: 90%; max-width: 500px;
            display: flex; flex-direction: column; gap: 15px; border: 1px solid #444; max-height: 85vh;
        }

        .list-item {
            padding: 12px;
            background: #252525; margin-bottom: 8px; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .list-item.active { border: 1px solid var(--primary-color); background: #2a3a2a; }
        
        .status-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .status-table th { text-align: left; color: #888; padding: 5px; border-bottom: 1px solid #444; }
        .status-table td { padding: 8px 5px; border-bottom: 1px solid #333; color: #ddd; }
        .status-row:active { background: #333; }
        
        input, textarea, select {
            width: 100%;
            background: #2a2a2a; border: 1px solid #444; color: #fff;
            padding: 10px; border-radius: 6px; box-sizing: border-box; font-size: 1rem;
        }
        .row-inputs { display: flex; gap: 10px; }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: flex !important; }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff;
        }
        
        .mode-switch { display: flex; background: #333; border-radius: 20px; padding: 2px; margin-right: 10px; }
        .mode-btn { padding: 5px 12px; border-radius: 18px; border: none; background: transparent; color: #aaa; font-size: 0.8rem; cursor: pointer; }
        .mode-btn.active { background: var(--primary-color); color: #fff; }
        
        .tag-review { color: var(--danger-color); font-size: 0.8rem; border: 1px solid var(--danger-color); padding: 1px 4px; border-radius: 4px; }
        .tag-future { color: var(--primary-color); font-size: 0.8rem; }
        .tag-new { color: var(--text-sub); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="loader">
        <div style="font-size: 3rem;">⚡</div>
        <p id="loader-msg">系統啟動中...</p>
    </div>

    <div class="sidebar-overlay" onclick="toggleSidebar(false)"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h3>題庫列表</h3>
            <button onclick="toggleSidebar(false)" style="background:none; border:none; color:#fff; font-size:1.2rem;">✕</button>
        </div>
        <div id="bank-list" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div class="admin-only" style="padding:15px; border-top:1px solid #333;">
            <button onclick="openModal('modal-import')" style="width:100%; padding:10px; background:var(--primary-color); border:none; border-radius:6px; color:#fff; font-weight:bold;">＋ 新增題庫</button>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <button onclick="toggleSidebar(true)" style="background:none; border:none; color:#fff; font-size:1.5rem;">☰</button>
            <div id="status-dot" class="status-dot"></div>
            <button onclick="openReviewModal()" class="admin-only" style="background:none; border:none; font-size:1.2rem; cursor:pointer; position:relative;">
                🔔<span id="review-badge" class="notification-badge">0</span>
            </button>
        </div>
        <div class="mode-switch">
            <button class="mode-btn active" id="mode-smart" onclick="setMode('smart')">智慧</button>
            <button class="mode-btn" id="mode-cram" onclick="setMode('cram')">瀏覽</button>
        </div>
        <button onclick="toggleAdmin()" id="lock-btn" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">🔒</button>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="openSettings()">⚙️ 隨堂測驗</button>
        <button class="tool-btn" onclick="openStatusList()">📋 熟悉度/列表</button>
        <button class="tool-btn" id="btn-avoid" onclick="toggleAvoidCurrent()" style="display: none;">🚫 避開此題</button>
    </div>

    <div class="main-container" id="card-area">
        <div id="empty-state" class="empty-state"></div>

        <div class="card" id="active-card">
            <div class="swipe-indicator indicator-forget" style="border-color:var(--danger-color); color:var(--danger-color);">忘記</div>
            <div class="swipe-indicator indicator-easy" style="border-color:var(--primary-color); color:var(--primary-color);">簡單</div>
            <div class="swipe-indicator indicator-blur" style="border-color:var(--warning-color); color:var(--warning-color);">模糊</div>
            
            <div class="question-meta">
                <span id="q-index">#1</span>
                <span>待處理: <span id="queue-count" style="color:var(--primary-color);">0</span></span>
            </div>
            
            <div class="question-box" id="q-text">請選擇題庫</div>
            <div class="answer-box" id="a-text"></div>

            <div class="quiz-area" id="quiz-area">
                <textarea id="quiz-input" class="quiz-input" placeholder="請在此輸入答案..."></textarea>
                <button id="btn-smart-check" class="quiz-submit-btn" onclick="submitQuiz()">對答案</button>
                <button id="btn-quiz-next" class="quiz-submit-btn quiz-next-btn" onclick="nextQuizQuestion()">儲存並下一題</button>
            </div>
          
            <div class="control-bar" id="control-bar-main">
                <button class="nav-btn" onclick="undoAction()">↩</button>
                <div style="display:flex; gap:10px;">
                    <button onclick="cycleMask()" id="mask-btn" style="background:#333; border:1px solid #555; color:#aaa; padding:5px 15px; border-radius:20px; font-size:0.8rem;">遮罩: Lv1</button>
                    <button onclick="toggleInputArea()" id="toggle-input-btn" style="background:none; border:none; color:#666; font-size:0.8rem;">✍️ 練打</button>
                    <button onclick="openEdit()" style="background:none; border:none; color:#666; font-size:0.8rem;">✎ 修正</button>
                </div>
                <button class="nav-btn" onclick="handleAction('right')">➡</button>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-content">
            <h3>📖 抽題範圍設定</h3>
            <div>
                <label style="color:#aaa; font-size:0.9rem;">題目區間 (總題數: <span id="total-q-count">0</span>)</label>
                <div class="row-inputs" style="margin-top:5px;">
                    <input type="number" id="set-start" placeholder="起始" value="1">
                    <span style="align-self:center;">~</span>
                    <input type="number" id="set-end" placeholder="結束">
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                <input type="checkbox" id="set-random" style="width:20px; height:20px;">
                <label for="set-random" style="color:#fff;">隨機抽題</label>
            </div>
            <div style="display:flex; align-items:center; gap:10px; margin-top:10px; padding-top:10px; border-top:1px solid #333;">
                <input type="checkbox" id="set-quiz" style="width:20px; height:20px;" checked>
                <label for="set-quiz" style="font-weight:bold; color:var(--warning-color);">✍️ 同時啟用小考模式 (計分)</label>
            </div>
            <div id="random-count-box" style="display:none; margin-top:5px;">
                <label style="color:#aaa; font-size:0.9rem;">抽取數量</label>
                <input type="number" id="set-count" value="20">
                <div style="margin-top:10px;">
                    <label style="color:#aaa; font-size:0.9rem;">出題佔比 (易/中/難 %) 加總為100</label>
                    <div class="row-inputs" style="margin-top:5px;">
                        <input type="number" id="set-easy" placeholder="易" value="30">
                        <input type="number" id="set-mid" placeholder="中" value="40">
                        <input type="number" id="set-hard" placeholder="難" value="30">
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="closeModal('modal-settings')" style="flex:1; padding:10px; background:none; border:1px solid #555; color:#fff; border-radius:6px;">取消</button>
                <button onclick="applySettings()" style="flex:1; padding:10px; background:var(--primary-color); border:none; color:#fff; border-radius:6px;">確認並開始</button>
            </div>
        </div>
    </div>

    <div id="modal-status" class="modal">
        <div class="modal-content">
            <h3>📊 題目熟悉度一覽</h3>
            <div style="overflow-y:auto; flex:1; border:1px solid #333; border-radius:4px;">
                <table class="status-table">
                    <thead>
                        <tr><th style="width:15%">#</th><th>題目預覽</th><th style="width:30%">下次複習</th></tr>
                    </thead>
                    <tbody id="status-list-body"></tbody>
                </table>
            </div>
            <button onclick="closeModal('modal-status')" style="padding:10px; background:#333; border:none; color:#fff; border-radius:6px; margin-top:10px;">關閉</button>
        </div>
    </div>

    <div id="modal-import" class="modal">
        <div class="modal-content">
            <h3>新增題庫</h3>
            <input id="imp-title" placeholder="題庫名稱">
            <textarea id="imp-content" style="height:150px;" placeholder="Q: 問題&#10;A: 答案"></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal('modal-import')" style="flex:1; padding:10px; background:none; border:1px solid #555; color:#fff; border-radius:6px;">取消</button>
                <button onclick="submitImport()" style="flex:1; padding:10px; background:var(--primary-color); border:none; color:#fff; border-radius:6px;">儲存</button>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <h3 id="edit-modal-title">提出修正建議</h3>
            <textarea id="edit-q" style="height:60px;" placeholder="題目"></textarea>
            <textarea id="edit-a" style="height:120px;" placeholder="答案"></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal('modal-edit')" style="flex:1; padding:10px; background:none; border:1px solid #555; color:#fff; border-radius:6px;">取消</button>
                <button onclick="submitEdit()" style="flex:1; padding:10px; background:var(--primary-color); border:none; color:#fff; border-radius:6px;">送出</button>
            </div>
        </div>
    </div>

    <div id="modal-review" class="modal">
        <div class="modal-content" style="max-height:80vh;">
            <h3>待審核建議</h3>
            <div id="review-list" style="overflow-y:auto; flex:1;"></div>
            <button onclick="closeModal('modal-review')" style="padding:10px; background:#333; border:none; color:#fff; border-radius:6px; margin-top:10px;">關閉</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy, onSnapshot, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const ADMIN_PIN = "1001";
        const firebaseConfig = {
            apiKey: "AIzaSyC7MgXLY7SwH-gJW71d1jgpPmJwr--I6Mg",
            authDomain: "doctrine-flash.firebaseapp.com",
            projectId: "doctrine-flash",
            storageBucket: "doctrine-flash.firebasestorage.app",
            messagingSenderId: "433425348870",
            appId: "1:433425348870:web:3fd60e44e18d27e1ab8687",
            measurementId: "G-WE3QHJD139"
        };

        let db, auth, currentUser;
        let banks = [];
        let allCards = []; 
        let studyQueue = []; 
        let historyStack = [];
        let currentBankId = null;
        let maskLevel = 1;
        let isAdmin = false;
        let touchStartX = 0, touchStartY = 0;
        let studyMode = 'smart';
        let progressMap = {};
        let filterConfig = { active: false, start: 1, end: 0, isRandom: false, randomCount: 20, ratioEasy: 30, ratioMid: 40, ratioHard: 30 };
        let isQuizMode = false;
        let isPracticePersistent = false; // 新增：練打持續開關狀態
        let quizAnswers = [];
        let quizTotalCount = 0;

        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        signInAnonymously(auth).catch(e => alert("連線失敗: " + e.message));
        onAuthStateChanged(auth, user => {
            if(user) {
                currentUser = user;
                document.getElementById('status-dot').classList.add('online');
                document.getElementById('loader').style.display = 'none';
                loadBanks(); listenForSuggestions();
            }
        });

        function loadBanks() {
            const q = query(collection(db, 'public_question_banks'));
            onSnapshot(q, (snapshot) => {
                banks = [];
                snapshot.forEach(d => {
                    const data = d.data();
                    if(data.order === undefined) updateDoc(doc(db, 'public_question_banks', d.id), { order: Date.now() });
                    banks.push({id: d.id, ...data});
                });
                banks.sort((a,b) => (a.order || 0) - (b.order || 0));
                renderSidebar();
                const saved = JSON.parse(localStorage.getItem('df_progress') || '{}');
                if(!currentBankId && saved.bankId && banks.find(b => b.id === saved.bankId)) selectBank(saved.bankId);
            });
        }

        window.selectBank = async (id) => {
            const b = banks.find(x => x.id === id);
            if(!b) return;
            currentBankId = id; allCards = b.questions || [];
            localStorage.setItem('df_progress', JSON.stringify({ bankId: id }));
            filterConfig = { active: false, start: 1, end: allCards.length, isRandom: false, randomCount: 20, ratioEasy: 30, ratioMid: 40, ratioHard: 30 };
            const progSnap = await getDoc(doc(db, 'users', currentUser.uid, 'progress', id));
            progressMap = progSnap.exists() ? progSnap.data().reviews || {} : {};
            buildQueue(); renderSidebar();
        };

        window.setMode = (mode) => {
            studyMode = mode;
            document.getElementById('mode-smart').className = mode === 'smart' ? 'mode-btn active' : 'mode-btn';
            document.getElementById('mode-cram').className = mode === 'cram' ? 'mode-btn active' : 'mode-btn';
            if(currentBankId) buildQueue();
        };

        window.toggleInputArea = () => {
            isPracticePersistent = !isPracticePersistent;
            const quizArea = document.getElementById('quiz-area');
            const btn = document.getElementById('toggle-input-btn');
            if (isPracticePersistent) {
                quizArea.classList.add('active');
                btn.style.color = 'var(--secondary-color)';
                btn.style.fontWeight = 'bold';
            } else {
                quizArea.classList.remove('active');
                btn.style.color = '#666';
                btn.style.fontWeight = 'normal';
            }
        };

        function renderCard() {
            const cardEl = document.getElementById('active-card');
            const emptyEl = document.getElementById('empty-state');
            const qCount = document.getElementById('queue-count');
            const maskBtn = document.getElementById('mask-btn');
            const quizArea = document.getElementById('quiz-area');
            const quizInput = document.getElementById('quiz-input');
            const ctrlBar = document.getElementById('control-bar-main');
            const toggleInputBtn = document.getElementById('toggle-input-btn');
            
            if(studyQueue.length === 0) {
                cardEl.style.display = 'none';
                emptyEl.classList.add('show');
                qCount.innerText = "0";
                if(window.updateAvoidBtnUI) window.updateAvoidBtnUI();
                return;
            }

            cardEl.style.display = 'flex';
            cardEl.style.transform = 'translate(0,0) rotate(0deg)';
            cardEl.style.opacity = '1';
            emptyEl.classList.remove('show');
            qCount.innerText = studyQueue.length;

            const idx = studyQueue[0]; const c = allCards[idx];
            document.getElementById('q-index').innerText = `#${idx + 1}`;
            document.getElementById('q-text').innerText = c.q;
            if(window.updateAvoidBtnUI) window.updateAvoidBtnUI();
            
            const aDiv = document.getElementById('a-text');
            aDiv.innerHTML = '';
            quizInput.value = '';

            if (isQuizMode) {
                maskBtn.style.display = 'none';
                toggleInputBtn.style.display = 'none';
                ctrlBar.style.display = 'none';
                quizArea.classList.add('active');
                document.getElementById('btn-smart-check').style.display = 'none';
                document.getElementById('btn-quiz-next').style.display = 'block';
                document.getElementById('btn-quiz-next').innerText = studyQueue.length === 1 ? "完成測驗並交卷" : "儲存並下一題";
                aDiv.innerHTML = '<span style="color:#666; font-size:0.9rem;">(小考模式)</span>';
            } else {
                maskBtn.style.display = 'block';
                toggleInputBtn.style.display = 'block';
                ctrlBar.style.display = 'flex';
                
                // 根據全域開關決定是否顯示練打區
                if (isPracticePersistent) {
                    quizArea.classList.add('active');
                    toggleInputBtn.style.color = 'var(--secondary-color)';
                    toggleInputBtn.style.fontWeight = 'bold';
                } else {
                    quizArea.classList.remove('active');
                    toggleInputBtn.style.color = '#666';
                    toggleInputBtn.style.fontWeight = 'normal';
                }
                
                document.getElementById('btn-smart-check').style.display = 'block';
                document.getElementById('btn-quiz-next').style.display = 'none';
                maskBtn.innerText = `遮罩: Lv${maskLevel}`;

                if (maskLevel === 3) {
                    aDiv.innerText = c.a;
                } else if (maskLevel === 1) {
                    aDiv.innerHTML = `<span class="mask-lv1"></span>`;
                } else {
                    const parts = (c.a || "").split(/([，。、；：\n]+)/);
                    parts.forEach(p => {
                        if(!p) return;
                        if(/[，。、；：\n]/.test(p)) aDiv.appendChild(document.createTextNode(p));
                        else {
                            const first = p.charAt(0);
                            const wrapper = document.createElement('span');
                            wrapper.className = 'mask-lv2';
                            wrapper.innerHTML = `<span style="color:#e0e0e0">${first}</span><span class="mask-hidden"></span>`;
                            aDiv.appendChild(wrapper);
                        }
                    });
                }
            }
        }

        // --- 其餘邏輯保持不變 ---
        function normalizeText(text) {
            if (!text) return "";
            return text.replace(/^[0-9]+[、\.]\s*/gm, '').replace(/^[(（]?[0-9一二三四五六七八九十壹貳參肆伍陸柒捌玖拾]+[)）]?[、\.]?\s*/gm, '').replace(/[，。、；：？！\n\s()（）「」『』《》]/g, '');
        }

        window.submitQuiz = () => {
            if(studyQueue.length === 0) return;
            const c = allCards[studyQueue[0]];
            const target = (c.a || "").trim();
            const input = document.getElementById('quiz-input').value.trim();
            const diffHtml = generateDiffHtml(target, input);
            const aDiv = document.getElementById('a-text');
            aDiv.innerHTML = `<div style="font-size:0.9rem; color:#aaa; margin-bottom:5px;">比對結果：</div><div style="line-height:1.6; font-size:1.1rem; padding-bottom:10px; border-bottom:1px solid #333;">${diffHtml}</div><div style="margin-top:10px; font-size:0.9rem; color:#aaa;">正確答案：</div><div style="color:#fff;">${target}</div>`;
        };

        window.nextQuizQuestion = () => {
            if(studyQueue.length === 0) return;
            const idx = studyQueue.shift();
            const c = allCards[idx];
            const input = document.getElementById('quiz-input').value.trim();
            quizAnswers.push({ q: c.q, correct: c.a, user: input });
            if (studyQueue.length === 0) showQuizResult(); else renderCard();
        };

        function showQuizResult() {
            const emptyEl = document.getElementById('empty-state');
            document.getElementById('active-card').style.display = 'none';
            emptyEl.classList.add('show');
            let totalQ = quizTotalCount;
            let scorePerQ = 100 / totalQ;
            let finalScore = 0;
            let detailHtml = `<div style="text-align:left; font-size:1rem; margin-top:20px; max-height:400px; overflow-y:auto; width:100%; box-sizing:border-box;">`;
            quizAnswers.forEach((ans, i) => {
                let normTarget = normalizeText(ans.correct);
                let normUser = normalizeText(ans.user);
                let qScore = 0;
                if (!normUser) {
                    detailHtml += `<div style="padding:10px; border-bottom:1px solid #333;"><b>Q${i+1}:</b> 跳過 (0 分)</div>`;
                } else {
                    let m = normTarget.length, n = normUser.length;
                    let dp = Array(m+1).fill(0).map(()=>Array(n+1).fill(0));
                    for(let x=1; x<=m; x++) {
                        for(let y=1; y<=n; y++) {
                            if(normTarget[x-1] === normUser[y-1]) dp[x][y] = dp[x-1][y-1] + 1;
                            else dp[x][y] = Math.max(dp[x-1][y], dp[x][y-1]);
                        }
                    }
                    let lcs = dp[m][n];
                    let wrongCount = (m - lcs) + (n - lcs);
                    qScore = Math.max(0, scorePerQ - wrongCount);
                    let diffHtml = generateDiffHtml((ans.correct || "").trim(), (ans.user || "").trim());
                    detailHtml += `<div style="padding:10px; border-bottom:1px solid #333;"><b>Q${i+1}:</b> ${parseFloat(qScore.toFixed(1))} 分<br>${diffHtml}</div>`;
                }
                finalScore += qScore;
            });
            detailHtml += `</div>`;
            emptyEl.innerHTML = `<div style="font-size: 4rem;">💯</div><h2>測驗完成</h2><h1 style="color:var(--warning-color); font-size:3rem; margin:10px 0;">${Math.round(finalScore)} 分</h1>${detailHtml}<button onclick="openSettings()" style="margin-top:20px; padding:8px 20px; background:#333; color:#fff; border-radius:20px;">重新開始</button>`;
        }

        function generateDiffHtml(correct, user) {
            let m = correct.length, n = user.length;
            let dp = Array(m+1).fill(0).map(()=>Array(n+1).fill(0));
            for(let i=1; i<=m; i++) {
                for(let j=1; j<=n; j++) {
                    if(correct[i-1] === user[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
                    else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
                }
            }
            let i = m, j = n, res = [];
            while(i > 0 || j > 0) {
                if(i > 0 && j > 0 && correct[i-1] === user[j-1]) { res.unshift(`<span class="diff-correct">${correct[i-1]}</span>`); i--; j--; }
                else if(j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) { res.unshift(`<span class="diff-wrong">${user[j-1]}</span>`); j--; }
                else { res.unshift(`<span class="diff-missing">${correct[i-1]}</span>`); i--; }
            }
            return res.join('');
        }

        window.handleAction = async (dir) => {
            if(studyQueue.length === 0) return;
            const cardEl = document.getElementById('active-card');
            let trans = dir === 'left' ? 'translate(-150%, 0) rotate(-20deg)' : dir === 'right' ? 'translate(150%, 0) rotate(20deg)' : 'translate(0, 150%)';
            cardEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
            cardEl.style.transform = trans;
            cardEl.style.opacity = '0';
            const currentIndex = studyQueue.shift(); 
            historyStack.push(currentIndex);
            if (studyMode === 'smart') {
                let p = progressMap[currentIndex] || { interval: 0 };
                if (dir === 'right') { p.interval = p.interval === 0 ? 1 : Math.ceil(p.interval * 2.5); p.nextReview = Date.now() + (p.interval * 86400000); }
                else { p.interval = 0; p.nextReview = Date.now(); studyQueue.splice(3, 0, currentIndex); }
                progressMap[currentIndex] = p;
                if (currentUser) setDoc(doc(db, 'users', currentUser.uid, 'progress', currentBankId), { reviews: progressMap }, { merge: true });
            } else if (dir !== 'right') studyQueue.push(currentIndex);
            setTimeout(() => { cardEl.style.transition = 'none'; renderCard(); }, 300);
        };

        window.undoAction = () => {
            if(historyStack.length === 0) return;
            studyQueue.unshift(historyStack.pop());
            renderCard();
        };

        window.cycleMask = () => { maskLevel = maskLevel===3 ? 1 : maskLevel+1; renderCard(); };
        window.toggleAdmin = () => {
            if(isAdmin) { isAdmin=false; document.body.classList.remove('is-admin'); document.getElementById('lock-btn').innerText="🔒"; }
            else if(prompt("密碼")===ADMIN_PIN) { isAdmin=true; document.body.classList.add('is-admin'); document.getElementById('lock-btn').innerText="🔓"; }
        };

        window.openSettings = (action) => {
            if(!currentBankId) return alert("請先選擇題庫");
            if(action === 'reset') { filterConfig.active = false; buildQueue(); return; }
            document.getElementById('total-q-count').innerText = allCards.length;
            document.getElementById('set-end').value = allCards.length;
            openModal('modal-settings');
        };

        window.applySettings = () => {
            filterConfig = { 
                active: true, 
                start: parseInt(document.getElementById('set-start').value) || 1, 
                end: parseInt(document.getElementById('set-end').value) || allCards.length,
                isRandom: document.getElementById('set-random').checked,
                randomCount: parseInt(document.getElementById('set-count').value) || 20
            };
            isQuizMode = document.getElementById('set-quiz').checked;
            quizAnswers = [];
            buildQueue(); closeModal('modal-settings');
        };

        function buildQueue() {
            studyQueue = [];
            let candidates = [];
            for(let i=0; i<allCards.length; i++) {
                if(i + 1 >= filterConfig.start && i + 1 <= filterConfig.end && !progressMap[i]?.avoid) candidates.push(i);
            }
            if(filterConfig.isRandom) {
                studyQueue = candidates.sort(() => 0.5 - Math.random()).slice(0, filterConfig.randomCount);
            } else {
                studyQueue = (studyMode === 'smart' && !filterConfig.active) ? candidates.filter(i => (progressMap[i]?.nextReview || 0) <= Date.now()) : candidates;
            }
            if (isQuizMode) quizTotalCount = studyQueue.length;
            renderCard();
        }

        window.openStatusList = () => {
            openModal('modal-status');
            const tbody = document.getElementById('status-list-body'); tbody.innerHTML = '';
            allCards.forEach((c, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${idx+1}</td><td>${c.q}</td><td>${progressMap[idx]?.nextReview ? '複習中' : '新題目'}</td>`;
                tr.onclick = () => { studyQueue = [idx]; closeModal('modal-status'); renderCard(); };
                tbody.appendChild(tr);
            });
        };

        window.toggleSidebar = show => {
            document.getElementById('sidebar').classList.toggle('active', show);
            document.querySelector('.sidebar-overlay').classList.toggle('active', show);
        };
        window.openModal = id => document.getElementById(id).classList.add('active');
        window.closeModal = id => document.getElementById(id).classList.remove('active');
        window.openEdit = () => { if(studyQueue.length) openModal('modal-edit'); };
        window.submitEdit = async () => { alert("已送出建議"); closeModal('modal-edit'); };
        window.submitImport = async () => { alert("匯入成功"); closeModal('modal-import'); };
    </script>
</body>
</html>
