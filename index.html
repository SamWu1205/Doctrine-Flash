<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>準則快憶通 SRS v2.2</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #4caf50; --secondary-color: #2196f3;
            --danger-color: #e57373; --warning-color: #ffb74d;
            --text-main: #e0e0e0; --text-sub: #aaaaaa;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;
            background: var(--surface-color); border-bottom: 1px solid #333; height: 50px; z-index: 20;
        }
        .toolbar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #181818;
            border-bottom: 1px solid #333; }
        .tool-btn { background: #333; color: #ccc;
            border: 1px solid #444; padding: 5px 12px; border-radius: 15px; font-size: 0.85rem; white-space: nowrap; cursor: pointer;
        }
        .main-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
            overflow: hidden; perspective: 1000px; }
        .card { 
            width: 90%;
            max-width: 600px; height: 85%; background: var(--surface-color); border-radius: 16px; padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column;
            position: absolute;
            transition: transform 0.3s ease, opacity 0.3s ease; border: 1px solid #333; touch-action: none;
        }
        .swipe-indicator { position: absolute; top: 20px; right: 20px; font-size: 2rem; font-weight: bold;
            opacity: 0; border: 4px solid; padding: 5px 10px; border-radius: 8px; transform: rotate(15deg); pointer-events: none; z-index: 50;
        }
        .swipe-left .indicator-blur { opacity: 1; color: var(--danger-color); border-color: var(--danger-color); }
        .swipe-right .indicator-easy { opacity: 1; color: var(--primary-color); border-color: var(--primary-color); }
        .question-box { font-size: 1.3rem; font-weight: bold; color: #81c784; margin-bottom: 20px; }
        .answer-box { font-size: 1.15rem; line-height: 1.8; flex: 1; overflow-y: auto; white-space: pre-wrap; position: relative; }
        .mask-lv1 { display: inline-block; width: 100%; height: 60px; background: #2a2a2a; border-radius: 8px; border: 1px dashed #444; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 500px;
            max-height: 85vh; overflow-y: auto; border: 1px solid #444; }
        input[type="number"] { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; margin: 5px 0; box-sizing: border-box; }
        .sidebar { position: fixed; top: 0; left: 0; width: 85%; max-width: 300px;
            height: 100%; background: #1e1e1e; z-index: 210; transform: translateX(-100%); transition: 0.3s; border-right: 1px solid #333;
        }
        .sidebar.active { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#121212; z-index:999; display:flex; justify-content:center; align-items:center;">⚡ 系統啟動中...</div>

    <div class="sidebar" id="sidebar">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h3>題庫清單</h3>
            <button onclick="toggleSidebar(false)" style="background:none; border:none; color:#888;">✕</button>
        </div>
        <div id="bank-list" style="padding:10px;"></div>
    </div>

    <div class="header">
        <button onclick="toggleSidebar(true)" style="background:none; border:none; color:#fff; font-size:1.5rem;">☰</button>
        <div style="background:#333; border-radius:20px; display:flex;">
            <button class="tool-btn" id="m-smart" onclick="setMode('smart')" style="border:none;">智慧</button>
            <button class="tool-btn" id="m-cram" onclick="setMode('cram')" style="border:none;">瀏覽</button>
        </div>
        <button onclick="toggleAdmin()" id="lock-btn" style="background:none; border:none;">🔒</button>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="openSettings()">⚙️ 測驗設定</button>
        <button class="tool-btn" onclick="openStatusList()">📋 熟悉度列表</button>
        <button class="tool-btn" onclick="toggleAvoidCurrent()">🚫 避開此題</button>
    </div>

    <div class="main-container">
        <div id="empty-state" style="display:none; text-align:center; padding:20px; width:100%;"></div>

        <div class="card" id="active-card" onclick="handleFlip()">
            <div class="swipe-indicator indicator-blur">模糊</div>
            <div class="swipe-indicator indicator-easy">簡單</div>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#666;">
                <span id="q-index">#0</span><span>剩餘: <span id="queue-count">0</span></span>
            </div>
            <div class="question-box" id="q-text"></div>
            <div class="answer-box" id="a-text"></div>
            
            <div id="quiz-area" style="display:none; flex-direction:column; gap:10px; margin-top:10px;">
                <textarea id="quiz-input" style="width:100%; height:120px; background:#111; color:#fff; border:1px solid #444; border-radius:8px; padding:10px;" placeholder="在此輸入答案..." onclick="event.stopPropagation()"></textarea>
                <button onclick="event.stopPropagation(); nextQuizQuestion()" style="padding:12px; background:var(--secondary-color); border:none; color:#fff; border-radius:8px; font-weight:bold;">下一題 / 交卷</button>
            </div>

            <div id="ctrl-bar" style="display:flex; justify-content:space-between; margin-top:auto; padding-top:10px; border-top:1px solid #333;">
                <button class="tool-btn" onclick="event.stopPropagation(); undoAction()">↩ 復原</button>
                <button class="tool-btn" id="mask-btn" onclick="event.stopPropagation(); toggleMask()">遮罩: Lv1</button>
                <button class="tool-btn" onclick="event.stopPropagation(); handleAction('left')">➡ 跳過</button>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal"><div class="modal-content">
        <h3>📖 測驗範圍與設定</h3>
        <label>範圍: 起始 ~ 結束</label>
        <div style="display:flex; gap:10px;">
            <input type="number" id="set-start" value="1">
            <input type="number" id="set-end">
        </div>
        <label>抽題數量</label>
        <input type="number" id="set-count" value="10">
        <div style="border-top:1px solid #333; margin:10px 0; padding-top:10px;">
            <label>難度佔比 (易 / 中 / 難 %)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="set-easy" value="30">
                <input type="number" id="set-mid" value="40">
                <input type="number" id="set-hard" value="30">
            </div>
        </div>
        <label style="display:flex; align-items:center; gap:10px; margin:10px 0;">
            <input type="checkbox" id="set-quiz" checked> ✍️ 啟用小考評分模式
        </label>
        <button onclick="applySettings()" style="width:100%; padding:12px; background:var(--primary-color); border:none; color:#fff; border-radius:6px; font-weight:bold; cursor:pointer;">開始測驗</button>
        <button onclick="closeModal('modal-settings')" style="width:100%; background:none; border:none; color:#aaa; margin-top:10px; cursor:pointer;">取消</button>
    </div></div>

    <div id="modal-status" class="modal"><div class="modal-content">
        <h3>📊 熟悉度列表</h3>
        <div id="status-list-body" style="display:flex; flex-direction:column; gap:8px;"></div>
        <button onclick="closeModal('modal-status')" style="width:100%; padding:10px; margin-top:15px;">關閉</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC7MgXLY7SwH-gJW71d1jgpPmJwr--I6Mg", authDomain: "doctrine-flash.firebaseapp.com", projectId: "doctrine-flash", storageBucket: "doctrine-flash.firebasestorage.app", messagingSenderId: "433425348870", appId: "1:433425348870:web:3fd60e44e18d27e1ab8687" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser, banks = [], allCards = [], studyQueue = [], historyStack = [], progressMap = {};
        let currentBankId = null, studyMode = 'smart', isQuizMode = false, maskLevel = 1, quizResults = [];
        let touchX = 0, touchY = 0;

        onAuthStateChanged(auth, async user => {
            if(user) { currentUser = user; await loadBanks(); document.getElementById('loader').style.display = 'none'; }
            else { signInAnonymously(auth); }
        });

        async function loadBanks() {
            const snap = await getDocs(collection(db, 'public_question_banks'));
            banks = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderSidebar();
            const saved = JSON.parse(localStorage.getItem('df_progress') || '{}');
            if(saved.bankId) selectBank(saved.bankId);
        }

        // --- 核心修復：新增 buildQueue 函式 ---
        function buildQueue() {
            if (!allCards.length) return;
            if (studyMode === 'smart') {
                const now = Date.now();
                studyQueue = allCards.map((_, i) => i).filter(i => {
                    const p = progressMap[i];
                    if (!p) return true;
                    if (p.avoid) return false;
                    return !p.nextReview || p.nextReview <= now;
                });
            } else {
                studyQueue = allCards.map((_, i) => i).filter(i => !progressMap[i]?.avoid);
            }
            renderCard();
        }

        window.selectBank = async (id) => {
            const b = banks.find(x => x.id === id);
            if(!b) return;
            currentBankId = id; allCards = b.questions || [];
            localStorage.setItem('df_progress', JSON.stringify({ bankId: id }));
            const pSnap = await getDoc(doc(db, 'users', currentUser.uid, 'progress', id));
            progressMap = pSnap.exists() ? pSnap.data().reviews || {} : {};
            buildQueue();
        };

        function normalize(t) { 
            if(!t) return "";
            return t.replace(/^[0-9]+[、\.]\s*/gm, '').replace(/^[(（]?[0-9一二三四五六七八九十]+[)）]?[、\.]?\s*/gm, '').replace(/[，。、；：？！\n\s()（）「」『』]/g, '');
        }

        window.openSettings = () => {
            if(!currentBankId) return alert("請先選擇題庫");
            document.getElementById('set-end').value = allCards.length;
            document.getElementById('modal-settings').classList.add('active');
        };

        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        window.applySettings = () => {
            const start = parseInt(document.getElementById('set-start').value) || 1;
            const end = parseInt(document.getElementById('set-end').value) || allCards.length;
            const count = parseInt(document.getElementById('set-count').value) || 10;
            isQuizMode = document.getElementById('set-quiz').checked;
            
            let pool = allCards.map((_, i) => i).filter(i => (i+1) >= start && (i+1) <= end && !progressMap[i]?.avoid);
            
            let easy = [], mid = [], hard = [];
            pool.forEach(i => {
                const inv = progressMap[i]?.interval || 0;
                if(inv === 0) hard.push(i); else if(inv <= 5) mid.push(i); else easy.push(i);
            });

            const rE = (parseInt(document.getElementById('set-easy').value) || 0) / 100;
            const rM = (parseInt(document.getElementById('set-mid').value) || 0) / 100;
            const shuffle = (a) => a.sort(() => Math.random() - 0.5);
            
            studyQueue = [
                ...shuffle(easy).slice(0, Math.floor(count * rE)), 
                ...shuffle(mid).slice(0, Math.floor(count * rM)), 
                ...shuffle(hard).slice(0, Math.max(0, count - Math.floor(count*rE) - Math.floor(count*rM)))
            ];
            
            quizResults = [];
            closeModal('modal-settings');
            renderCard();
        };

        function renderCard() {
            const card = document.getElementById('active-card');
            const empty = document.getElementById('empty-state');
            if(studyQueue.length === 0) {
                card.style.display = 'none';
                empty.style.display = 'block';
                if(isQuizMode && quizResults.length > 0) showFinalScore();
                else empty.innerHTML = "🎉 任務完成";
                return;
            }
            card.style.display = 'flex'; empty.style.display = 'none';
            card.style.transform = 'translate(0,0)'; card.style.opacity = '1';
            
            const idx = studyQueue[0];
            document.getElementById('q-index').innerText = `#${idx + 1}`;
            document.getElementById('q-text').innerText = allCards[idx].q;
            document.getElementById('queue-count').innerText = studyQueue.length;
            
            const aDiv = document.getElementById('a-text');
            const quizArea = document.getElementById('quiz-area');
            if(isQuizMode) {
                aDiv.innerText = "(測驗模式中，請在下方輸入)";
                quizArea.style.display = 'flex';
                document.getElementById('ctrl-bar').style.display = 'none';
                document.getElementById('quiz-input').value = '';
            } else {
                quizArea.style.display = 'none';
                document.getElementById('ctrl-bar').style.display = 'flex';
                aDiv.innerHTML = maskLevel === 3 ? allCards[idx].a : '<div class="mask-lv1"></div>';
            }
        }

        window.handleFlip = () => { if(!isQuizMode) { maskLevel = 3; renderCard(); } };

        window.nextQuizQuestion = () => {
            const idx = studyQueue.shift();
            const input = document.getElementById('quiz-input').value;
            const correct = allCards[idx].a;
            
            const normC = normalize(correct);
            const normI = normalize(input);
            
            let wrong = Math.abs(normC.length - normI.length);
            for(let i=0; i < Math.min(normC.length, normI.length); i++) {
                if(normC[i] !== normI[i]) wrong++;
            }
            
            quizResults.push({ q: allCards[idx].q, ans: correct, user: input, score: Math.max(0, 10 - wrong), wrong });
            renderCard();
        };

        function showFinalScore() {
            let total = quizResults.reduce((a, b) => a + b.score, 0);
            let html = `<h2>測驗得分: ${Math.round(total)} 分</h2><div style="text-align:left; max-height:300px; overflow-y:auto;">`;
            quizResults.forEach(r => {
                html += `<div style="border-bottom:1px solid #333; padding:10px;"><b>Q: ${r.q}</b><br>錯字數: ${r.wrong}<br><span style="color:#888;">正解: ${r.ans}</span></div>`;
            });
            html += `</div><button onclick="location.reload()" style="margin-top:20px; padding:10px; cursor:pointer;">重新開始</button>`;
            document.getElementById('empty-state').innerHTML = html;
        }

        window.openStatusList = () => {
            const body = document.getElementById('status-list-body');
            const now = Date.now();
            body.innerHTML = allCards.map((c, i) => {
                const p = progressMap[i];
                let tag = '<span style="color:#888;">未練習</span>';
                if(p?.avoid) tag = '<span style="color:#e57373;">🚫 避開</span>';
                else if(p?.nextReview) {
                    const diff = Math.ceil((p.nextReview - now) / (1000 * 3600 * 24));
                    tag = diff <= 0 ? '<span style="color:#ffb74d;">需複習</span>' : `<span style="color:#4caf50;">${diff} 天後</span>`;
                }
                return `<div onclick="jumpToCard(${i})" style="display:flex; justify-content:space-between; background:#252525; padding:10px; border-radius:6px; cursor:pointer;"><span>#${i+1} ${c.q.substring(0,10)}...</span>${tag}</div>`;
            }).join('');
            document.getElementById('modal-status').classList.add('active');
        };

        window.handleAction = async (dir) => {
            const idx = studyQueue.shift();
            historyStack.push(idx);
            if(studyMode === 'smart') {
                let p = progressMap[idx] || { interval: 0 };
                if(dir === 'right') p.interval = p.interval === 0 ? 1 : Math.ceil(p.interval * 2.5);
                else p.interval = 0;
                p.nextReview = Date.now() + (p.interval * 24 * 3600 * 1000);
                progressMap[idx] = p;
                await setDoc(doc(db, 'users', currentUser.uid, 'progress', currentBankId), { reviews: progressMap }, { merge: true });
                if(dir !== 'right') studyQueue.push(idx);
            } else { 
                if(dir !== 'right') studyQueue.push(idx); 
            }
            maskLevel = 1;
            renderCard();
        };

        const card = document.getElementById('active-card');
        card.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; card.style.transition = 'none'; });
        card.addEventListener('touchmove', e => {
            if(isQuizMode) return;
            let dx = e.touches[0].clientX - touchX;
            card.style.transform = `translate(${dx}px, 0) rotate(${dx*0.05}deg)`;
            card.classList.toggle('swipe-left', dx < -80); card.classList.toggle('swipe-right', dx > 80);
        });
        card.addEventListener('touchend', e => {
            if(isQuizMode) return;
            let dx = e.changedTouches[0].clientX - touchX;
            if(dx > 100) handleAction('right'); else if(dx < -100) handleAction('left');
            else { card.style.transition = '0.3s'; card.style.transform = 'translate(0,0)'; }
            card.classList.remove('swipe-left', 'swipe-right');
        });

        window.undoAction = () => {
            if (historyStack.length > 0) {
                const prev = historyStack.pop();
                studyQueue.unshift(prev);
                renderCard();
            }
        };

        window.toggleMask = () => {
            maskLevel = maskLevel === 1 ? 3 : 1;
            document.getElementById('mask-btn').innerText = `遮罩: Lv${maskLevel}`;
            renderCard();
        };

        window.jumpToCard = (i) => { studyQueue = studyQueue.filter(x => x !== i); studyQueue.unshift(i); closeModal('modal-status'); renderCard(); };
        window.setMode = (m) => { studyMode = m; buildQueue(); };
        window.toggleSidebar = (s) => document.getElementById('sidebar').classList.toggle('active', s);
        window.toggleAvoidCurrent = () => { 
            let i = studyQueue[0]; 
            if(i === undefined) return;
            progressMap[i] = { ...progressMap[i], avoid: !progressMap[i]?.avoid }; 
            buildQueue(); 
        };
        function renderSidebar() { document.getElementById('bank-list').innerHTML = banks.map(b => `<div onclick="selectBank('${b.id}'); toggleSidebar(false)" style="padding:15px; border-bottom:1px solid #333; cursor:pointer;">${b.title}</div>`).join(''); }
    </script>
</body>
</html>
